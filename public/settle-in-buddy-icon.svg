<svg width="120" height="120" viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg">

  <!-- Rounded background -->
  <rect x="0" y="0" width="120" height="120" rx="24" fill="#0a5c44"/>

  <!-- Mini UK flag background -->
  <g opacity="0.25">
    <rect x="10" y="10" width="100" height="100" rx="16" fill="#012169"/>
    <line x1="10" y1="10" x2="110" y2="110" stroke="#fff" stroke-width="20"/>
    <line x1="110" y1="10" x2="10" y2="110" stroke="#fff" stroke-width="20"/>
    <line x1="10" y1="10" x2="110" y2="110" stroke="#C8102E" stroke-width="7"/>
    <line x1="110" y1="10" x2="10" y2="110" stroke="#C8102E" stroke-width="7"/>
    <rect x="10" y="52" width="100" height="16" fill="#fff"/>
    <rect x="52" y="10" width="16" height="100" fill="#fff"/>
    <rect x="10" y="55" width="100" height="10" fill="#C8102E"/>
    <rect x="55" y="10" width="10" height="100" fill="#C8102E"/>
  </g>

  <!-- Telescopic handle rods -->
  <rect x="44" y="12" width="6" height="36" rx="3" fill="#063d2e"/>
  <rect x="70" y="12" width="6" height="36" rx="3" fill="#063d2e"/>
  <!-- Handle grip -->
  <rect x="38" y="8" width="44" height="12" rx="6" fill="#063d2e"/>
  <rect x="41" y="10" width="38" height="8" rx="4" fill="#085041"/>
  <rect x="44" y="12" width="32" height="4" rx="2" fill="#0f7a5a"/>

  <!-- Suitcase body -->
  <rect x="20" y="44" width="80" height="60" rx="10" fill="#0f7a5a"/>
  <!-- Shell highlight -->
  <rect x="23" y="47" width="74" height="14" rx="7" fill="#1d9e75" opacity="0.5"/>
  <!-- Corner bolts -->
  <rect x="20" y="44" width="10" height="10" rx="4" fill="#085041"/>
  <rect x="90" y="44" width="10" height="10" rx="4" fill="#085041"/>
  <rect x="20" y="94" width="10" height="10" rx="4" fill="#085041"/>
  <rect x="90" y="94" width="10" height="10" rx="4" fill="#085041"/>
  <!-- Centre split -->
  <line x1="60" y1="46" x2="60" y2="102" stroke="#085041" stroke-width="2"/>
  <!-- Ribs -->
  <rect x="24" y="60" width="72" height="2" rx="1" fill="#085041" opacity="0.5"/>
  <rect x="24" y="72" width="72" height="2" rx="1" fill="#085041" opacity="0.5"/>
  <rect x="24" y="84" width="72" height="2" rx="1" fill="#085041" opacity="0.5"/>
  <!-- Latch -->
  <rect x="46" y="68" width="28" height="8" rx="3" fill="#063d2e"/>
  <rect x="48" y="70" width="10" height="4" rx="2" fill="#9FE1CB" opacity="0.6"/>
  <rect x="62" y="70" width="10" height="4" rx="2" fill="#9FE1CB" opacity="0.6"/>

  <!-- Plane sticker - small -->
  <rect x="26" y="50" width="22" height="14" rx="4" fill="#1a56db"/>
  <ellipse cx="37" cy="57" rx="7" ry="3" fill="#fff"/>
  <ellipse cx="44" cy="57" rx="2" ry="2" fill="#fff"/>
  <path d="M30 57 L28 52 L34 56 Z" fill="#fff"/>

  <!-- UK flag sticker - small -->
  <g transform="translate(72,50)">
    <rect x="0" y="0" width="18" height="12" rx="3" fill="#012169"/>
    <line x1="0" y1="0" x2="18" y2="12" stroke="#fff" stroke-width="3"/>
    <line x1="18" y1="0" x2="0" y2="12" stroke="#fff" stroke-width="3"/>
    <line x1="0" y1="0" x2="18" y2="12" stroke="#C8102E" stroke-width="1.5"/>
    <line x1="18" y1="0" x2="0" y2="12" stroke="#C8102E" stroke-width="1.5"/>
    <rect x="0" y="4" width="18" height="4" fill="#fff"/>
    <rect x="7" y="0" width="4" height="12" fill="#fff"/>
    <rect x="0" y="5" width="18" height="2" fill="#C8102E"/>
    <rect x="8" y="0" width="2" height="12" fill="#C8102E"/>
  </g>

  <!-- Luggage tag -->
  <rect x="76" y="78" width="14" height="16" rx="3" fill="#ff5c3a"/>
  <circle cx="83" cy="75" r="3" fill="#ff5c3a"/>
  <circle cx="83" cy="75" r="1.5" fill="#fff"/>

  <!-- Carry handle -->
  <rect x="48" y="40" width="24" height="8" rx="4" fill="#063d2e"/>
  <rect x="50" y="42" width="20" height="4" rx="2" fill="#085041"/>

  <!-- Wheels -->
  <rect x="24" y="101" width="14" height="5" rx="2" fill="#042e22"/>
  <circle cx="31" cy="110" r="8" fill="#042e22"/>
  <circle cx="31" cy="110" r="5" fill="#063d2e"/>
  <circle cx="31" cy="110" r="2.5" fill="#085041"/>
  <circle cx="31" cy="110" r="1" fill="#9FE1CB" opacity="0.7"/>

  <rect x="82" y="101" width="14" height="5" rx="2" fill="#042e22"/>
  <circle cx="89" cy="110" r="8" fill="#042e22"/>
  <circle cx="89" cy="110" r="5" fill="#063d2e"/>
  <circle cx="89" cy="110" r="2.5" fill="#085041"/>
  <circle cx="89" cy="110" r="1" fill="#9FE1CB" opacity="0.7"/>

</svg>
